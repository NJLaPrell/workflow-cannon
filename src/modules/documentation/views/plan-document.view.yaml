  - id: risk_register
    source: idea_plan
    renderer: renderPlanDocumentRiskRegister
    title: Risk register
  - id: assumptions
    source: idea_plan
    renderer: renderPlanDocumentAssumptions
    title: Assumptions
  - id: open_questions
    source: idea_plan
    renderer: renderPlanDocumentOpenQuestions
    title: Open questions
  - id: review
    source: idea_plan
    renderer: renderPlanDocumentReview
    title: Review
  - id: acceptance
    source: idea_plan
    renderer: renderPlanDocumentAcceptance
    title: Acceptance
  - id: delivery_refs
    source: idea_plan
    renderer: renderPlanDocumentDeliveryRefs
