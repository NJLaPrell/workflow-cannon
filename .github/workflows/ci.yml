name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Test
        run: pnpm test

  release-readiness:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release metadata check
        run: node scripts/check-release-metadata.mjs

      - name: Dry-run pack
        run: pnpm run pack:dry-run

      - name: Phase 4 gates
        run: pnpm run phase4-gates

      - name: Advisory task-state hand-edit check
        continue-on-error: true
        run: pnpm run advisory:task-state-hand-edit

  parity:
    needs: [test, release-readiness]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run parity validation
        run: pnpm run parity

      - name: Generate runtime diagnostics
        if: always()
        run: pnpm run generate-runtime-diagnostics

      - name: Upload parity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-evidence
          path: artifacts/parity-evidence.json
          retention-days: 30

      - name: Upload runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-diagnostics
          path: artifacts/runtime-diagnostics.json
          retention-days: 30
