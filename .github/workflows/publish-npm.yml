name: Publish NPM
# Triggers:
# - `workflow_dispatch` from clone: `pnpm run publish:npm` (needs `gh` + workflow dispatch permission)
# - `push` of version tags `v*` (phase closeout tag)
# - `release` published (GitHub Releases UI — no manual "Run workflow" required)

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag to publish with"
        required: true
        default: latest
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run ui:prepare

      - name: Test
        run: pnpm run test:run

      - name: Release metadata check
        run: node scripts/check-release-metadata.mjs

      - name: Maintainer gates
        run: pnpm run maintainer-gates

      - name: Parity validation
        run: pnpm run parity

      - name: Publish package to npm
        run: npm publish --access public --tag "${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
