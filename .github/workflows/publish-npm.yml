name: Publish NPM

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag to publish with"
        required: true
        default: latest
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Release metadata check
        run: node scripts/check-release-metadata.mjs

      - name: Phase 4 gates
        run: pnpm run phase4-gates

      - name: Parity validation
        run: pnpm run parity

      - name: Publish package to npm
        run: npm publish --access public --tag "${{ inputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
